<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint - Complaint Box</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-megaphone"></i> Submit Complaint</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Submit New Complaint</h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info">
                            <i class="bi bi-shield-lock"></i> Your complaint will be anonymous. Only staff can see your identity.
                        </div>
                        <form id="complaintForm" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label>Category</label>
                                <select id="category" class="form-control" required>
                                    <option>Academic</option>
                                    <option>Facility</option>
                                    <option>Harassment</option>
                                    <option>Administrative</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Description</label>
                                <textarea id="description" class="form-control" rows="5" 
                                    placeholder="Describe your complaint clearly. Please avoid abusive language." 
                                    required></textarea>
                                <small class="text-muted">Minimum 10 characters</small>
                            </div>
                            <div class="mb-3">
                                <label>Evidence (Optional)</label>
                                <input type="file" id="file" class="form-control" accept="image/*,.pdf,.doc,.docx">
                                <small class="text-muted">Max 5MB. Supported: Images, PDF, DOC</small>
                            </div>
                            <div class="alert alert-warning small">
                                <i class="bi bi-exclamation-triangle"></i> 
                                <strong>Note:</strong> You can submit up to 3 complaints per day. Abusive content will result in account restriction.
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Submit Complaint</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/script.js"></script>
</body>
</html>
