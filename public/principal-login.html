<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principal Login - Complaint Box</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .principal-card {
            border-top: 4px solid #dc3545;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card principal-card">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0"><i class="bi bi-shield-lock"></i> Principal Login</h4>
                    </div>
                    <div class="card-body">
                        <form id="principalLoginForm">
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" id="email" class="form-control" required>
                                <small class="text-muted">Default: principal@school.com</small>
                            </div>
                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" id="password" class="form-control" required>
                                <small class="text-muted">Default: principal123</small>
                            </div>
                            <button type="submit" class="btn btn-danger w-100">Login as Principal</button>
                        </form>
                        <hr>
                        <div class="text-center">
                            <a href="/admin-login.html" class="text-decoration-none">
                                <i class="bi bi-person-badge"></i> Staff Login
                            </a>
                            <br>
                            <a href="/login.html" class="text-decoration-none">
                                <i class="bi bi-person"></i> Student Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/script.js"></script>
</body>
</html>
